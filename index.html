<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta name="keywords" content="">
  <title>FAXBID</title>
  <link rel="stylesheet" href="css/select2.min.css">
  <link rel="stylesheet" href="css/multiselect.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="preload">
  <div class="wrap">
    <header class="header">
      <div class="header__wrap container">
        <a href="#" class="logo">
          <img src="img/logo.svg" width="78" alt="FAXBID">
        </a>
        <ul class="header__actions actions">
          <li class="actions__item">
            <a href="#" class="actions__link action">
              <svg class="action__icon" width="17" height="15">
                <use xlink:href="img/sprite.svg#heart"></use>
              </svg>
              <span class="action__text">Saved</span>
            </a>
          </li>
          <li class="actions__item">
            <a href="#" class="actions__link action">
              <svg class="action__icon" width="18" height="18">
                <use xlink:href="img/sprite.svg#lang"></use>
              </svg>
              <span class="action__text">English</span>
            </a>
          </li>
        </ul>
      </div>
    </header>
    <main>
      <section class="main-search">
        <div class="container">
          <h1 class="main-title">Find history of lotssold at<br> Copart and IAAI auctionts on <span class="violet">FAXBID</span></h1>
          <div class="search search--main">
            <div class="tabs">
              <ul class="search__tabs tabs__list">
                <li class="tabs__btn tabs__btn--active">
                  <a href="#">Search</a>
                </li>
                <li class="tabs__btn">
                  <a href="#">Filter</a>
                </li>
              </ul>
              <ul class="tabs__content">
                <li class="tabs__item search__wrap">
                  <form class="search__field" action="#">
                    <input class="search__input" type="search" name="search" id="search" placeholder="VIN code or number of lot">
                    <button class="search__copy" type="button">
                      <svg width="17" height="21">
                        <use xlink:href="img/sprite.svg#copy"></use>
                      </svg>
                    </button>
                  </form>
                  <div class="search__btn-wrap">
                    <button class="search__btn btn" type="submit">
                      <svg class="btn__icon" width="16" height="16">
                        <use xlink:href="img/sprite.svg#search"></use>
                      </svg>
                      <span>Search</span>
                    </button>
                  </div>
                </li>
                <li class="tabs__item search__filter">
                  <form class="filter" action="#">
                    <div class="filter__item filter__item--brand">
                      <select class="filter__select filter__select--brand" name="brand">
                        <option></option>
                        <option value="Abarth">Abarth</option>
                        <option value="Acura">Acura</option>
                        <option value="Adler">Adler</option>
                        <option value="Aero">Aero</option>
                      </select>
                    </div>
                    <div class="filter__item filter__item--model">
                      <select class="filter__select filter__select--model" name="model">
                        <option></option>
                      <option value="100">100</option>
                      <option value="80">80</option>
                      <option value="A4 Allroad">A4 Allroad</option>
                      <option value="A4">A4</option>
                      </select>
                    </div>
                    <div class="filter__item filter__item--year">
                      <select class="filter__select filter__select--year" id="year-select" name="year" multiple="miltiple">
                        <option></option>
                      <option value="2020">2020</option>
                      <option value="2019">2019</option>
                      <option value="2018">2018</option>
                      <option value="2017">2017</option>
                      <option value="2016">2016</option>
                      <option value="2015">2015</option>
                      <option value="2014">2014</option>
                      </select>
                    </div>
                    <button class="filter__btn btn" type="submit">
                      <svg class="btn__icon" width="16" height="16">
                        <use xlink:href="img/sprite.svg#search"></use>
                      </svg>
                      <span>Search</span>
                    </button>
                  </form>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
<script src="js/jquery-3.5.1.min.js"></script>
<script src="js/select2.min.js"></script>
<script src="js/multiselect.min.js"></script>
<script src="js/main.js"></script>

</html>
